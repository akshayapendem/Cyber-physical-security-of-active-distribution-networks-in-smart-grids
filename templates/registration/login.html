{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center fade-in">
  <div class="col-md-6">
    <div class="card p-4">
      <h2 class="mb-4">User Login</h2>
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary btn-glow">Login</button>
      </form>
      <p class="mt-4 text-center">New to the platform? <a href="{% url 'register' %}">Register here</a>.</p>
    </div>
  </div>
</div>
{% endblock %}
