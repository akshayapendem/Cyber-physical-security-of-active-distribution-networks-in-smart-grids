{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center fade-in">
  <div class="col-md-6">
    <div class="card p-4 shadow-sm border-0" style="background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);">
      <h2 class="mb-4">Upload Dataset</h2>
      <p class="text-muted">Upload a .csv dataset to power the smart grid predictive models.</p>
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
          {{ form.as_p }}
        </div>
        <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-glow btn-lg">Upload and Analyze</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
